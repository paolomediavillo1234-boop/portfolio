<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
        }

        nav {
            background: #555;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00adb5;
        }

        section {
            padding: 40px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .project-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid #00adb5;
            transition: transform 0.3s ease;
        }

        .card:hover .project-img {
            transform: scale(1.1);
        }

        footer {
            background: #333;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Projects</h1>
    <p>Here are some of my works</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="main.html">Projects</a>
</nav>

<section>
    <h2>Project Gallery</h2>

    <div class="projects">

        <div class="card">
            <img src="project1.jpg" class="project-img" alt="Project 1">
            <h3>Project 1</h3>
            <p>Description of your project.</p>
        </div>

        <div class="card">
            <img src="project2.jpg" class="project-img" alt="Project 2">
            <h3>Project 2</h3>
            <p>Description of your project.</p>
        </div>

        <div class="card">
            <img src="project3.jpg" class="project-img" alt="Project 3">
            <h3>Project 3</h3>
            <p>Description of your project.</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
